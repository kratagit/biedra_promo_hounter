name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Wersja (np. 1.0.0). Zostaw puste = z package.json'
        required: false
        default: ''

jobs:
  build-linux:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VER="${{ github.event.inputs.version }}"
          if [ -z "$VER" ]; then
            VER=$(node -p "require('./package.json').version")
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Building version: $VER"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies & PyInstaller
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Python binary
        run: |
          pyinstaller \
            --distpath dist_py \
            --workpath build_py \
            --noconfirm \
            --onedir \
            --name biedrona \
            --hidden-import=PIL \
            --hidden-import=PIL.Image \
            --hidden-import=certifi \
            --collect-data certifi \
            biedrona.py
          cp -r dist_py/biedrona python_dist

      - name: Install npm dependencies
        run: npm install

      - name: Build Electron (Linux)
        run: npx electron-builder --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename artifact
        run: |
          VER="${{ steps.version.outputs.version }}"
          mv dist/*.AppImage "dist/Biedra-Promo-Hunter-${VER}-Linux-x86_64.AppImage"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/Biedra-Promo-Hunter-*-Linux-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: |
          VER="${{ github.event.inputs.version }}"
          if [ -z "$VER" ]; then
            VER=$(node -p "require('./package.json').version")
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Building version: $VER"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies & PyInstaller
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Python binary
        run: |
          pyinstaller --distpath dist_py --workpath build_py --noconfirm --onedir --name biedrona --hidden-import=PIL --hidden-import=PIL.Image --hidden-import=certifi --collect-data certifi biedrona.py
          xcopy dist_py\biedrona python_dist\ /E /I /Q
        shell: cmd

      - name: Install npm dependencies
        run: npm install

      - name: Build Electron (Windows)
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename artifact
        shell: bash
        run: |
          VER="${{ steps.version.outputs.version }}"
          mv dist/*.exe "dist/Biedra-Promo-Hunter-${VER}-Windows-x86_64.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/Biedra-Promo-Hunter-*-Windows-x86_64.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-linux.outputs.version }}
          name: v${{ needs.build-linux.outputs.version }}
          body: |
            ## Biedra Promo Hunter v${{ needs.build-linux.outputs.version }}

            ### Wymagania:
            - **Tesseract OCR** — musi być zainstalowany osobno
              - Linux: `sudo apt install tesseract-ocr tesseract-ocr-pol` lub `sudo pacman -S tesseract tesseract-data-pol`
              - Windows: [UB-Mannheim installer](https://github.com/UB-Mannheim/tesseract/wiki)

            ### Pliki do pobrania:
            - **Windows** (portable, bez instalacji): `Biedra-Promo-Hunter-${{ needs.build-linux.outputs.version }}-Windows-x86_64.exe`
            - **Linux** (AppImage): `Biedra-Promo-Hunter-${{ needs.build-linux.outputs.version }}-Linux-x86_64.AppImage`
          files: |
            artifacts/linux-build/*
            artifacts/windows-build/*
          make_latest: true
